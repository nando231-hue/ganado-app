/* ================== GENERAL ================== */
html, body {

  margin: 0;

}

/* ================== MENU ================== */
#menu {
  position: fixed;
  width: 200px;
  height: 100%;
  background: #1e293b;
  color: white;
  padding: 15px;
}

/* ================== CONTENIDO ================== */
#contenido {
  margin-left: 220px;
  padding: 10px;
  background: rgba(255,255,255,0.9);
}

/* ================== LAYOUT ================== */
#layoutAnimales {
  display: flex;
  gap: 10px;
  height: 80vh; /* 🔥 CLAVE */
}

/* ================== LISTA ANIMALES ================== */
#listaAnimales {
  width: 300px;
  max-height: 80vh;
  overflow-y: auto;
  background: white;
  padding: 10px;
  border-radius: 10px;
}

/* ================== MAPA + PANEL (FIX DEFINITIVO) ================== */
#mapLayout {
  display: flex;
  gap: 10px;
  flex: 1; /* 🔥 CLAVE */
}

/* PANEL LATERAL */
#panelControles {
  width: 220px;
  background: white;
  padding: 10px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

/* MAPA */
#map {
  flex: 1;
  width: 100%;
  height: 100%;
  min-height: 400px;
  border-radius: 10px;
}

/* ================== FORMULARIO ================== */
#formulario {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 15px;
  border-radius: 10px;
}

/* ================== INPUTS ================== */
input, select, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

/* BOTONES */
button {
  background: #adafae;
  color: white;
  border: none;
  border-radius: 8px;
}

/* ================== HISTORIAL LATERAL ================== */
#panelLateral {
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 320px;
}

#historialPanel {
  display: none;
  background: white;
  padding: 10px;
  border-radius: 10px;
  max-height: 80vh;
  overflow-y: auto;
}

#historialPanel h3 {
  margin-top: 0;
}

/* ================== CHAT ASISTENTE ================== */
#chatPanel {
  display: none;
  background: white;
  padding: 10px;
  border-radius: 10px;
  max-height: 80vh;
  overflow-y: auto;
}

#chatConversacion {
  height: 300px;
  overflow-y: auto;
  border: 1px solid #ccc;
  padding: 10px;
  margin-bottom: 10px;
  background: #f9f9f9;
}

#chatInput {
  width: calc(100% - 60px);
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 5px;
}

#chatEnviar {
  width: 50px;
  padding: 8px;
  background: #adafae;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

/* ================== REBAÑOS ================== */
#rebanosPanel {
  display: none;
  background: white;
  padding: 10px;
  border-radius: 10px;
  max-height: 80vh;
  overflow-y: auto;
}

/* 📱 MOBILE */
@media (max-width: 768px) {
  #menu {
    position: relative;
    width: 100%;
    height: auto;
  }

  #contenido {
    margin-left: 0;
  }

  #layoutAnimales {
    flex-direction: column;
    height: auto;
  }

  #mapLayout {
    flex-direction: column;
    height: auto;
  }

  #panelLateral,
  #panelControles {
    width: 100%;
  }

  #map {
    height: 60vh;
    min-height: 300px;
  }
}

.enfermo { border-left-color: red; }

function importarCSV(){

  let input = document.getElementById("fileInput");

  if(!input.files.length){
    alert("Seleccioná archivo");
    return;
  }

  let file = input.files[0];
  let reader = new FileReader();

  reader.onload = function(e){

    let lineas = e.target.result.split(/\r?\n/);

    let sep = lineas[0].includes(";") ? ";" : ",";

    for(let i=1;i<lineas.length;i++){

      let fila = lineas[i].trim();
      if(!fila) continue;

      let c = fila.split(sep);

      if(animales.some(a => a.id === c[0])) continue;

      animales.push({
        id: c[0],
        edad: c[1],
        raza: c[2],
        lote: c[3],
        obs: c[4],
        estado: c[5],
        lat: c[6],
        lng: c[7]
      });
    }

    localStorage.setItem("animales", JSON.stringify(animales));
    mostrar();

    alert("CSV cargado correctamente");
  };

  reader.readAsText(file);
}

// ZONA DETECCIÓN
function estaDentroZona(lat, lng){

  if(!zonas || zonas.length === 0) return true;

  for(let z of zonas){

    let coordsRaw = z.getLatLngs();

    // 🔥 normalizar estructura
    let coords = Array.isArray(coordsRaw[0]) ? coordsRaw[0] : coordsRaw;

    let puntos = coords.map(c => [c.lng, c.lat]);

    let dentro = puntoDentroPoligono([lng, lat], puntos);

    if(dentro) return true;
  }

  return false;
}

function puntoEnPoligono(lat, lng, coords){

  let dentro = false;

  for(let i = 0, j = coords.length - 1; i < coords.length; j = i++){

    let xi = coords[i].lat;
    let yi = coords[i].lng;
    let xj = coords[j].lat;
    let yj = coords[j].lng;

    let intersect = ((yi > lng) != (yj > lng)) &&
      (lat < (xj - xi) * (lng - yi) / (yj - yi) + xi);

    if(intersect) dentro = !dentro;
  }

  return dentro;
}
function guardarZona(){

  if(puntosZona.length < 3){
    alert("Marcá al menos 3 puntos");
    return;
  }

  let nombre = prompt("Nombre de la zona:");
  if(!nombre) nombre = "Zona sin nombre";

  let nuevaZona = L.polygon(puntosZona, {color:'blue'}).addTo(map);

  nuevaZona.nombre = nombre;

  const cantidad = contarAnimalesEnZona(nuevaZona);
  nuevaZona.bindPopup("Zona: " + nombre + "<br>Animales en zona: " + cantidad);

  nuevaZona.on('click', function(){
    zonas.forEach(z => z.setStyle({color:'blue'}));
    this.setStyle({color:'red'});
    zonaSeleccionada = this;

    alert("Zona: " + this.nombre);
  });

  zonas.push(nuevaZona);

  // 🔥 guardar BIEN
  let zonasGuardar = zonas.map(z => ({
    nombre: z.nombre,
    coords: z.getLatLngs()[0]
  }));

  localStorage.setItem("zonas", JSON.stringify(zonasGuardar));

  if(window.poligonoTemp){
    map.removeLayer(window.poligonoTemp);
    window.poligonoTemp = null;
  }

  puntosZona = [];
}



function borrarZona(){

  if(!zonaSeleccionada){
    alert("Seleccioná una zona");
    return;
  }

  map.removeLayer(zonaSeleccionada);

  zonas = zonas.filter(z => z !== zonaSeleccionada);

  localStorage.setItem("zonas", JSON.stringify(
  zonas.map(z => ({
    nombre: z.nombre,
    coords: z.getLatLngs()[0]
  }))
));

  zonaSeleccionada = null;
}

function exportarCSV(){

  // Tomar todos los marcadores del mapa
  let capas = Object.values(map._layers);

  // Filtrar solo los marcadores (los animales)
  let marcadores = capas.filter(l => l.getLatLng);

  if(marcadores.length === 0){
    alert("No hay animales para exportar");
    return;
  }

  let csv = "ID;Lote;Estado;Lat;Lng;Peso;Fecha\r\n";

  marcadores.forEach(m => {

    // Recuperar datos que ya usaste para el popup
    let a = m.options.datosAnimal || {};

    csv += (a.id || "") + ";" +
           (a.lote || "") + ";" +
           (a.estado || "") + ";" +
           (m.getLatLng().lat || "") + ";" +
           (m.getLatLng().lng || "") + ";" +
           (
  a.pesos && a.pesos.length > 0
    ? a.pesos[a.pesos.length - 1].valor
    : ""
) + ";" +
           (
  a.pesos && a.pesos.length > 0 && a.pesos[a.pesos.length - 1].fecha
    ? (function(f){ let d = new Date(f); return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear(); })(a.pesos[a.pesos.length - 1].fecha)
    : ""
) +
           "\r\n";
  });

  let blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });

  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "animales.csv";
  link.click();
}
function alertasPeso(a){

  let alertas = [];

  if(!a.pesos || a.pesos.length < 2) return alertas;

  // Comparar los dos últimos registros de peso
  let penultimo = a.pesos[a.pesos.length - 2];
  let ultimo = a.pesos[a.pesos.length - 1];

  let pesoPenultimo = parseFloat(penultimo.valor);
  let pesoUltimo = parseFloat(ultimo.valor);

  if(isNaN(pesoPenultimo) || isNaN(pesoUltimo)) return alertas;

  // Alerta: peso disminuyó
  if(pesoUltimo < pesoPenultimo){
    alertas.push("⚠️ Bajando peso (" + pesoPenultimo + " → " + pesoUltimo + " kg)");
  }

  // Alerta: crecimiento lento (ganancia diaria < 0.3 kg/día)
  let fechaPenultimo = new Date(penultimo.fecha);
  let fechaUltimo = new Date(ultimo.fecha);
  let dias = (fechaUltimo - fechaPenultimo) / (1000 * 60 * 60 * 24);

  if(dias >= 1 && dias <= 365){
    let gananciaDiaria = (pesoUltimo - pesoPenultimo) / dias;
    // Solo mostrar alerta si el crecimiento es realista (no detectar valores glitchy)
    if(gananciaDiaria >= 0 && gananciaDiaria < 0.3 && gananciaDiaria <= 2){
      alertas.push("🐢 Crecimiento lento (" + gananciaDiaria.toFixed(2) + " kg/día)");
    }
  }

  return alertas;
}
function obtenerRanking(lista){

  let ranking = [];

  lista.forEach(function(a){
    let g = calcularGanancia(a);
    if(g === "-") return;
    ranking.push({ id: a.id, ganancia: parseFloat(g) });
  });

  if(ranking.length === 0){
    console.log("📊 RANKING: No hay animales con datos suficientes");
    return;
  }

  // Ordenar de mayor a menor ganancia
  ranking.sort(function(a, b){ return b.ganancia - a.ganancia; });

  let top = ranking.slice(0, 3);
  let peor = ranking.slice(-3).reverse();

  console.log("📊 TOP GANANCIA:");
  top.forEach(function(r){
    console.log("  ID: " + r.id + " - " + r.ganancia.toFixed(2) + " kg/día");
  });

  console.log("📊 PEOR GANANCIA:");
  peor.forEach(function(r){
    console.log("  ID: " + r.id + " - " + r.ganancia.toFixed(2) + " kg/día");
  });
}
function calcularGanancia(a){

  if(!a.pesos || a.pesos.length < 2) return "-";

  let primero = a.pesos[0];
  let ultimo = a.pesos[a.pesos.length - 1];

  let pesoInicial = parseFloat(primero.valor);
  let pesoFinal = parseFloat(ultimo.valor);

  // Validar que los pesos sean números válidos y positivos
  if(isNaN(pesoInicial) || isNaN(pesoFinal) || pesoInicial <= 0 || pesoFinal <= 0) return "-";

  let fechaInicial = new Date(primero.fecha);
  let fechaFinal = new Date(ultimo.fecha);

  let dias = (fechaFinal - fechaInicial) / (1000 * 60 * 60 * 24);

  // Validar que haya al menos 1 día y máximo 1000 días (validez de datos)
  if(dias < 1 || dias > 1000) return "-";

  let ganancia = (pesoFinal - pesoInicial) / dias;

  // Limitar a valores realistas: ganado puede crecer max ~2 kg/día
  // Y puede perder max ~1 kg/día (enfermedad, estrés)
  if(ganancia > 2 || ganancia < -1) return "-";

  return ganancia.toFixed(2);
}
function estimarPeso(a){

  if(!a.pesos || a.pesos.length < 2) return "-";

  let primero = a.pesos[0];
  let ultimo = a.pesos[a.pesos.length - 1];

  let pesoInicial = parseFloat(primero.valor);
  let pesoFinal = parseFloat(ultimo.valor);

  if(isNaN(pesoInicial) || isNaN(pesoFinal) || pesoInicial <= 0 || pesoFinal <= 0) return "-";

  let fechaInicial = new Date(primero.fecha);
  let fechaFinal = new Date(ultimo.fecha);

  let dias = (fechaFinal - fechaInicial) / (1000*60*60*24);
  
  // Validar período de datos realista
  if(dias < 1 || dias > 1000) return "-";

  let aumento = pesoFinal - pesoInicial;
  let crecimiento = aumento / dias;

  // Validar que el crecimiento proyectado sea realista
  if(crecimiento > 2 || crecimiento < -1) return "-";

  return Math.round(pesoFinal + crecimiento * 30);
}

    let actualizados = 0;
    let noEncontrados = 0;

      let fila = lineas[i].trim();
      if(!fila) continue;

      let c = fila.split(sep);

      let caravana = c[0];
      let peso = c[1];

      let animal = animales.find(a => String(a.id) === String(caravana));

      if(animal){

        // 🔥 asegurar historial
        if(!animal.pesos){
          animal.pesos = [];
        }

       let fecha = new Date().toISOString().split("T")[0]; // solo fecha

// evitar duplicados del mismo día
let yaExiste = animal.pesos.some(p => p.fecha === fecha);

if(!yaExiste){
  animal.pesos.push({
    valor: parseFloat(peso),
    fecha: fecha
  });
}

        actualizados++;

      } else {
        noEncontrados++;
      }
    }

    localStorage.setItem("animales", JSON.stringify(animales));
    mostrar();

    alert(
      "Actualizados: " + actualizados +
      "\nNo encontrados: " + noEncontrados
    );
  };

  reader.readAsText(file);
  
}
function puntoDentroPoligono(point, vs) {

  let x = point[0], y = point[1];
  let inside = false;

  for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {

    let xi = vs[i][0], yi = vs[i][1];
    let xj = vs[j][0], yj = vs[j][1];

    let intersect = ((yi > y) != (yj > y)) &&
      (x < (xj - xi) * (y - yi) / (yj - yi) + xi);

    if (intersect) inside = !inside;
  }

  return inside;
}

function dibujarGrafico(pesos){
  let canvas = document.getElementById("graficoPeso");
  if(!canvas) return;

  let ctx = canvas.getContext("2d");
  let width = canvas.width;
  let height = canvas.height;

  // Ordenar pesos por fecha
  let datos = pesos.slice().sort((a,b) => new Date(a.fecha) - new Date(b.fecha));

  // Encontrar min/max
  let pesosVal = datos.map(p => parseFloat(p.valor));
  let minPeso = Math.min(...pesosVal);
  let maxPeso = Math.max(...pesosVal);
  let rangoPeso = maxPeso - minPeso || 1;

  // Fechas
  let fechas = datos.map(p => new Date(p.fecha));
  let minFecha = Math.min(...fechas);
  let maxFecha = Math.max(...fechas);
  let rangoFecha = maxFecha - minFecha || 1;

  // Limpiar canvas
  ctx.clearRect(0, 0, width, height);

  // Dibujar ejes
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(40, 20);
  ctx.lineTo(40, height - 20);
  ctx.lineTo(width - 20, height - 20);
  ctx.stroke();

  // Etiquetas eje Y
  ctx.fillStyle = "#000";
  ctx.font = "10px Arial";
  ctx.fillText(maxPeso + "kg", 5, 25);
  ctx.fillText(minPeso + "kg", 5, height - 15);

  // Etiquetas eje X
  let fechaInicio = new Date(datos[0].fecha).toLocaleDateString();
  let fechaFin = new Date(datos[datos.length-1].fecha).toLocaleDateString();
  ctx.fillText(fechaInicio, 45, height - 5);
  ctx.fillText(fechaFin, width - 80, height - 5);

  // Dibujar línea
  ctx.strokeStyle = "#007bff";
  ctx.lineWidth = 2;
  ctx.beginPath();

  datos.forEach((p, i) => {
    let x = 40 + ((new Date(p.fecha) - minFecha) / rangoFecha) * (width - 60);
    let y = height - 20 - ((parseFloat(p.valor) - minPeso) / rangoPeso) * (height - 40);
    if(i === 0){
      ctx.moveTo(x, y);
    } else {
      ctx.lineTo(x, y);
    }
  });
  ctx.stroke();

  // Puntos
  ctx.fillStyle = "#007bff";
  datos.forEach(p => {
    let x = 40 + ((new Date(p.fecha) - minFecha) / rangoFecha) * (width - 60);
    let y = height - 20 - ((parseFloat(p.valor) - minPeso) / rangoPeso) * (height - 40);
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, 2 * Math.PI);
    ctx.fill();
  });
}

function obtenerUltimoPeso(animal){
  if(!animal) return null;
  if(animal.pesos && animal.pesos.length > 0){
    return animal.pesos[animal.pesos.length - 1].valor;
  } else if(animal.peso && animal.peso !== "Sin datos"){
    return animal.peso;
  }
  return null;
}

function verRebano(index){
  if(!rebanos[index]) return;
  let rebano = rebanos[index];
  let panel = document.getElementById("panelLateral");
  if(!panel) return;
  
  let html = `<div style="padding: 15px; background: white; border-radius: 10px; max-height: 80vh; overflow-y: auto;">`;
  html += `<button onclick="mostrarVista('rebanos')" style="padding: 8px 15px; background: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 5px;">⬅️ Volver a Rebaños</button>`;
  html += `<button onclick="exportarRebano(${index})" style="margin-left: 5px; padding: 8px 15px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;">📥 Exportar</button>`;
  html += `<button onclick="eliminarRebano(${index})" style="margin-left: 5px; padding: 8px 15px; background: #d32f2f; color: white; border: none; border-radius: 5px; cursor: pointer;">🗑️ Eliminar</button><br><br>`;
  html += `<h3>Rebaño: ${rebano.nombre}</h3>`;
  html += `<p><b>Cantidad de animales:</b> ${rebano.animales.length}</p>`;
  
  let pesos = [];
  let ganancias = [];
  rebano.animales.forEach(id => {
    let animal = animales.find(a => String(a.id) == String(id));
    if(animal){
      let peso = obtenerUltimoPeso(animal);
      if(peso !== null && peso !== undefined) pesos.push(parseFloat(peso));
      let gan = calcularGanancia(animal);
      if(gan !== "-" && !isNaN(parseFloat(gan))) ganancias.push(parseFloat(gan));
    }
  });
  
  let promedioPeso = pesos.length > 0 ? (pesos.reduce((a,b)=>a+b,0)/pesos.length).toFixed(2) + ' kg' : "Sin datos";
  let promedioGanancia = ganancias.length > 0 ? (ganancias.reduce((a,b)=>a+b,0)/ganancias.length).toFixed(2) + ' kg/día' : "Sin datos";
  
  html += `<p><b>Peso promedio:</b> ${promedioPeso}</p>`;
  html += `<p><b>Ganancia promedio:</b> ${promedioGanancia}</p><br>`;
  
  html += `<h4>📋 Animales en el rebaño:</h4>`;
  if(rebano.animales.length === 0){
    html += `<p>Ninguno</p>`;
  } else {
    html += `<div style="background: #f9f9f9; padding: 10px; border-radius: 5px; margin-bottom: 10px;">`;

      let animal = animales.find(a => String(a.id) == String(id));

      let peso = obtenerUltimoPeso(animal);
      let pesoStr = peso !== null ? peso + ' kg' : 'Sin datos';

function actualizarListaAnimales(rebanoIndex){
  if(!rebanos[rebanoIndex]) return;
  let rebano = rebanos[rebanoIndex];
  let inputBuscador = document.getElementById("buscadorAnimales");
  let busqueda = inputBuscador ? inputBuscador.value.toLowerCase() : "";
  let html = "";
  
  animales.forEach(a => {
    let idStr = String(a.id || "").toLowerCase();
    if(!rebano.animales.includes(a.id) && idStr.includes(busqueda)){
      html += `<label><input type="checkbox" value="${a.id}" onchange="toggleAnimalRebano(${rebanoIndex}, '${a.id}', this.checked)"> ${a.id}</label><br>`;
    }
  });
  
  if(html === "") html = "<p>No hay animales disponibles</p>";
  let listaDiv = document.getElementById("listaAnimalesRebano");
  if(listaDiv) listaDiv.innerHTML = html;
}

function toggleAnimalRebano(rebanoIndex, animalId, checked){
  if(!rebanos[rebanoIndex]) return;
  
  if(checked){
    if(!rebanos[rebanoIndex].animales.includes(animalId)){
      rebanos[rebanoIndex].animales.push(animalId);
    }
  } else {
    rebanos[rebanoIndex].animales = rebanos[rebanoIndex].animales.filter(id => String(id) !== String(animalId));
  }
  localStorage.setItem("rebanos", JSON.stringify(rebanos));
}

function exportarRebano(index){
  if(index === undefined || !rebanos[index]) {
    alert("Error: Rebaño no encontrado");
    return;
  }
  
  let rebano = rebanos[index];
  console.log("Exportando rebaño:", rebano.nombre, "IDs:", rebano.animales);
  
  if(!rebano.animales || rebano.animales.length === 0){
    alert("El rebaño no tiene animales para exportar");
    return;
  }
  
  let lineas = ["ID;Peso;Ganancia"];
  let animalesExportados = 0;
  
  rebano.animales.forEach(function(idAnimal) {
    console.log("Buscando animal con ID:", idAnimal);
    let animal = null;
    
    for(let i = 0; i < animales.length; i++){
      if(String(animales[i].id) === String(idAnimal)){
        animal = animales[i];
        break;
      }
    }
    
    if(animal){
      console.log("Animal encontrado:", animal);
      animalesExportados++;
      let peso = obtenerUltimoPeso(animal);
      let pesoStr = (peso !== null && peso !== undefined) ? String(peso) : "Sin datos";
      let ganancia = calcularGanancia(animal);
      let gananciaStr = (ganancia && ganancia !== "-") ? String(ganancia) : "Sin datos";
      let linea = String(idAnimal) + ";" + pesoStr + ";" + gananciaStr;
      console.log("Línea CSV:", linea);
      lineas.push(linea);
    } else {
      console.log("Animal NO encontrado con ID:", idAnimal);
    }
  });
  
  console.log("Animales exportados:", animalesExportados, "Total:", lineas.length - 1);
  
  
  if(animalesExportados === 0){
    alert("No se encontraron animales válidos en el rebaño para exportar");
    return;
  }
  
  // Construir CSV con BOM UTF-8 para Excel
  let csv = '\uFEFF';  // BOM UTF-8 - necesario para Excel
  csv += lineas.join("\r\n") + "\r\n";
  
  console.log("CSV con BOM generado, tamaño:", csv.length, "bytes");
  console.log("Primeros caracteres:", csv.substring(0, 50));
  
  // Crear Blob correctamente con charset utf-8
  let blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  
  console.log("Blob creado, tamaño:", blob.size, "bytes");
  
  // Crear link
  let link = document.createElement("a");
  
  // Asignar URL del blob
  let url = URL.createObjectURL(blob);
  link.href = url;
  
  // Asignar nombre con timestamp opcional para evitar caché
  let nombreArchivo = rebano.nombre.replace(/[^a-z0-9]/gi, "_").toLowerCase() + ".csv";
  link.download = nombreArchivo;
  
  console.log("Descargando:", nombreArchivo, "| Tamaño Blob:", blob.size, "bytes");
  
  // Agregar al DOM
  document.body.appendChild(link);
  
  // Ejecutar click
  link.click();
  
  console.log("Click ejecutado en link de descarga");
  
  // Limpiar recursos
  setTimeout(function() {
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    console.log("Recurso liberado");
    alert("✓ Rebaño exportado a Excel: " + nombreArchivo);
  }, 250);
}

function quitarAnimalDelRebano(rebanoIndex, animalId){
